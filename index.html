<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illogical Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            color: white;
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.2);
        }

        .signup-button {
            background: white;
            color: #667eea;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 18px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .signup-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }

        .signup-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .signup-button {
                font-size: 1rem;
                padding: 15px 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Illogical Project</h1>
        <button class="signup-button" onclick="handleSignup()">Sign Up & Contact</button>
    </div>

    <script>
        function handleSignup() {
            // You can customize this with your actual contact method
            // For now, it opens the user's email client
            window.location.href = 'mailto:your-email@example.com?subject=Illogical Project - Sign Up';

            // Alternatively, you could link to a form or other contact page:
            // window.location.href = 'your-contact-form-url';
        }
    </script>
</body>
</html>
